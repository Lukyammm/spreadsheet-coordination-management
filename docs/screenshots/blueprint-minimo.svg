  <text x="82" y="120" class="ui" font-size="28" font-weight="850" fill="#101b2c">Blueprint mínimo</text><text x="82" y="147" class="ui" font-size="13" font-weight="600" fill="#65758b">Próximo desenho coerente com o nome do repo, sem apresentar como tela existente</text><rect x="82" y="162" width="56" height="4" rx="3" fill="#64748b" stroke="#64748b"/><rect x="82" y="220" width="1182" height="230" rx="12" fill="#ffffff" stroke="#dce5ef"/><text x="100" y="250" class="ui" font-size="16" font-weight="800" fill="#142033">Mapa de implementação</text><rect x="98" y="264" width="1150" height="34" rx="8" fill="#f2f6fa" stroke="#f2f6fa"/><text x="110" y="286" class="ui" font-size="11" font-weight="800" fill="#617187">Módulo sugerido</text><text x="392" y="286" class="ui" font-size="11" font-weight="800" fill="#617187">Depende de</text><text x="674" y="286" class="ui" font-size="11" font-weight="800" fill="#617187">Evidência atual</text><text x="956" y="286" class="ui" font-size="11" font-weight="800" fill="#617187">Status</text><line x1="100" y1="300" x2="1246" y2="300" stroke="#e7edf4" stroke-width="1" stroke-linecap="round"/><text x="110" y="322" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">Bases</text><text x="392" y="322" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">Code.gs</text><text x="674" y="322" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">arquivo vazio</text><rect x="956" y="302" width="112" height="26" rx="13" fill="#e6f7ef" stroke="#e6f7ef"/><text x="1012" y="320" class="ui" font-size="12" font-weight="800" fill="#13704c" text-anchor="middle">não impleme…</text><line x1="100" y1="342" x2="1246" y2="342" stroke="#e7edf4" stroke-width="1" stroke-linecap="round"/><text x="110" y="364" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">Rotinas</text><text x="392" y="364" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">Triggers</text><text x="674" y="364" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">arquivo vazio</text><rect x="956" y="344" width="112" height="26" rx="13" fill="#e6f7ef" stroke="#e6f7ef"/><text x="1012" y="362" class="ui" font-size="12" font-weight="800" fill="#13704c" text-anchor="middle">não impleme…</text><line x1="100" y1="384" x2="1246" y2="384" stroke="#e7edf4" stroke-width="1" stroke-linecap="round"/><text x="110" y="406" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">Indicadores</text><text x="392" y="406" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">index.html</text><text x="674" y="406" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">arquivo vazio</text><rect x="956" y="386" width="112" height="26" rx="13" fill="#e6f7ef" stroke="#e6f7ef"/><text x="1012" y="404" class="ui" font-size="12" font-weight="800" fill="#13704c" text-anchor="middle">não impleme…</text><line x1="100" y1="426" x2="1246" y2="426" stroke="#e7edf4" stroke-width="1" stroke-linecap="round"/><text x="110" y="448" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">Logs</text><text x="392" y="448" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">Planilha</text><text x="674" y="448" class="ui" font-size="12" font-weight="600" fill="#2b3b4f">README genérico</text><rect x="956" y="428" width="112" height="26" rx="13" fill="#fff6df" stroke="#fff6df"/><text x="1012" y="446" class="ui" font-size="12" font-weight="800" fill="#9a6208" text-anchor="middle">pendente</text><rect x="82" y="554" width="1182" height="114" rx="16" fill="#ffffff" stroke="#e2e8f0"/><text x="112" y="596" class="ui" font-size="20" font-weight="850" fill="#0f172a">Imagem-guia de estado, não screenshot de produto</text><text x="112" y="628" class="ui" font-size="14" font-weight="600" fill="#475569">A fidelidade aqui é sinalizar a ausência de sistema no código versionado.</text>
  <text x="1076" y="832" class="ui" font-size="11" fill="#8a98ab">Tela demonstrativa baseada no código do repositório - dados fictícios</text>
